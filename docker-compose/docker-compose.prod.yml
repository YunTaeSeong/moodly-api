# VPS 배포용 Compose override — Docker Hub에서 이미지만 pull (VPS에서 빌드하지 않음)

services:
  moodly-configserver:
    image: ${DOCKERHUB_USERNAME}/moodly-configserver:${IMAGE_TAG:-latest}

  moodly-eurekaserver:
    image: ${DOCKERHUB_USERNAME}/moodly-eurekaserver:${IMAGE_TAG:-latest}

  moodly-auth:
    image: ${DOCKERHUB_USERNAME}/moodly-auth:${IMAGE_TAG:-latest}

  moodly-user:
    image: ${DOCKERHUB_USERNAME}/moodly-user:${IMAGE_TAG:-latest}

  moodly-product:
    image: ${DOCKERHUB_USERNAME}/moodly-product:${IMAGE_TAG:-latest}

  moodly-cart:
    image: ${DOCKERHUB_USERNAME}/moodly-cart:${IMAGE_TAG:-latest}

  moodly-order:
    image: ${DOCKERHUB_USERNAME}/moodly-order:${IMAGE_TAG:-latest}

  moodly-notification:
    image: ${DOCKERHUB_USERNAME}/moodly-notification:${IMAGE_TAG:-latest}

  moodly-coupon:
    image: ${DOCKERHUB_USERNAME}/moodly-coupon:${IMAGE_TAG:-latest}

  moodly-payment:
    image: ${DOCKERHUB_USERNAME}/moodly-payment:${IMAGE_TAG:-latest}

  moodly-gateway:
    image: ${DOCKERHUB_USERNAME}/moodly-gateway:${IMAGE_TAG:-latest}
