services:
  moodly-configserver:
    image: moodly-configserver:latest
    container_name: moodly-configserver
    build:
      context: ..
      dockerfile: configserver/Dockerfile
    ports:
      - "8071:8071"
    healthcheck:
      test: "curl --fail --silent localhost:8071/actuator/health | grep UP || exit 1"
      interval: 10s     # 상태 확인 주기
      timeout: 5s       # 제한 시간
      retries: 10       # 재시도 횟수
      start_period: 10s # 부팅되는동안 기다려주는 시간
    extends:
      file: common-config.yml
      service: microservice-base-config

  moodly-eurekaserver:
    image: moodly-eurekaserver:latest
    container_name: moodly-eurekaserver
    build:
      context: ..
      dockerfile: eurekaserver/Dockerfile
    ports:
      - "8070:8070"
    healthcheck:
      test: "curl --fail --silent localhost:8070/actuator/health | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    extends:
      file: common-config.yml
      service: microservice-configserver-config
    environment:
      SPRING_APPLICATION_NAME: eurekaserver

  moodly-redis:
    image: redis:7
    container_name: moodly-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    extends:
      file: common-config.yml
      service: network-deploy-service

  moodly-zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: moodly-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    extends:
      file: common-config.yml
      service: network-deploy-service

  moodly-kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: moodly-kafka
    depends_on:
      - moodly-zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: moodly-zookeeper:2181

      # 내부(컨테이너간) / 외부(호스트) 접속 분리
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://moodly-kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # 단일 브로커면 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    extends:
      file: common-config.yml
      service: network-deploy-service

  moodly-auth-db:
    container_name: moodly-auth-db
    ports:
      - "3310:3306"
    environment:
      MYSQL_DATABASE: moodly_auth
    volumes:
      - auth-db:/var/lib/mysql
    extends:
      file: common-config.yml
      service: microservice-db-config

  moodly-auth:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: auth-service/Dockerfile
    image: tsyundeveloper/moodly-auth:latest
    container_name: moodly-auth
    expose:
      - "8081"
    healthcheck:
      test: "curl --fail --silent localhost:8081/actuator/health | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    environment:
      SPRING_APPLICATION_NAME: auth-service
      SPRING_PROFILES_ACTIVE: docker
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_ACCESS_TOKEN: ${JWT_ACCESS_TOKEN}
      JWT_REFRESH_TOKEN: ${JWT_REFRESH_TOKEN}
      JWT_SECRET: ${JWT_SECRET}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET}
      KAKAO_REDIRECT_URI: ${KAKAO_REDIRECT_URI}
    depends_on:
      moodly-auth-db:
        condition: service_healthy
      moodly-user:
        condition: service_healthy
    extends:
      file: common-config.yml
      service: microservice-eurekaserver-config

  moodly-user-db:
    container_name: moodly-user-db
    ports:
      - "3311:3306"
    environment:
      MYSQL_DATABASE: moodly_user
    volumes:
      - user-db:/var/lib/mysql
    extends:
      file: common-config.yml
      service: microservice-db-config

  moodly-user:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: user-service/Dockerfile
    image: tsyundeveloper/moodly-user:latest
    container_name: moodly-user
    expose:
      - "8082"
    healthcheck:
      test: "curl --fail --silent localhost:8082/actuator/health | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    environment:
      SPRING_APPLICATION_NAME: user-service
      SPRING_PROFILES_ACTIVE: docker
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      NAVER_MAIL_USERNAME: ${NAVER_MAIL_USERNAME}
      NAVER_MAIL_PASSWORD: ${NAVER_MAIL_PASSWORD}
      APP_FRONTEND_BASE_URL: http://localhost:3000
    depends_on:
      moodly-configserver:
        condition: service_healthy
      moodly-user-db:
        condition: service_healthy
      moodly-redis:
        condition: service_healthy
      moodly-kafka:
        condition: service_healthy
    extends:
      file: common-config.yml
      service: microservice-eurekaserver-config

  moodly-product-db:
