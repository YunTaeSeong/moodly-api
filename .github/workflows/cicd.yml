name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build JAR
        run: ./gradlew clean bootJar -x test

      - name: Docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push Docker images
        env:
          REGISTRY: ${{ secrets.DOCKER_USERNAME }}
        run: |
          build_push() {
            local dockerfile=$1
            local image=$2
            docker build -f "${dockerfile}" -t "${REGISTRY}/${image}:latest" .
            docker push "${REGISTRY}/${image}:latest"
          }

          build_push configserver/Dockerfile moodly-configserver
          build_push eurekaserver/Dockerfile moodly-eurekaserver
          build_push auth-service/Dockerfile moodly-auth
          build_push user-service/Dockerfile moodly-user
          build_push product-service/Dockerfile moodly-product
          build_push cart-service/Dockerfile moodly-cart
          build_push order-service/Dockerfile moodly-order
          build_push notification-service/Dockerfile moodly-notification
          build_push coupon-service/Dockerfile moodly-coupon
          build_push payment-service/Dockerfile moodly-payment
          build_push gateway-service/Dockerfile moodly-gateway
