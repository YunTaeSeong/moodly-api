name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: Deploy image tag (default = latest commit short SHA)
        required: false
        type: string
      skip_deploy:
        description: Build and push only (skip VPS deploy)
        required: false
        type: boolean
        default: false

concurrency:
  group: cicd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'

permissions:
  contents: read

jobs:
  test:
    name: Gradle test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test --no-daemon --stacktrace

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
          if-no-files-found: ignore
          retention-days: 7

  build-and-push:
    name: Build JARs & push Docker images
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build bootJar (all services)
        run: ./gradlew bootJar --no-daemon -x test

      - name: Set image tag
        run: |
          if [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
            echo "IMAGE_TAG=${{ github.event.inputs.image_tag }}" >> "$GITHUB_ENV"
          else
            echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push all images
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          chmod +x scripts/push-docker-images.sh
          bash scripts/push-docker-images.sh

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && !inputs.skip_deploy)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Set image tag
        run: |
          if [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
            echo "IMAGE_TAG=${{ github.event.inputs.image_tag }}" >> "$GITHUB_ENV"
          else
            echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DOCKERHUB_USERNAME,IMAGE_TAG,DEPLOY_PATH
          script: |
            set -euo pipefail
            export DOCKERHUB_USERNAME="${DOCKERHUB_USERNAME}"
            export IMAGE_TAG="${IMAGE_TAG}"
            export DEPLOY_PATH="${DEPLOY_PATH:-/opt/moodly-api}"
            bash "${DEPLOY_PATH}/scripts/deploy-vps.sh"
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
